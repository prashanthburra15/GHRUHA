<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHRUHA.com signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/signup.css">
</head>
<body>

    <header class="bg-white shadow p-4 flex justify-between items-center">
    <a href="index.html" class="text-xl font-bold">GHRUHA.COM</a>

    <nav class="flex items-center space-x-4">
        <a href="index.html" class="text-blue-500">Home</a>
        <a href="predict.html" class="text-blue-500">AI Prediction</a>

        <div id="user-info"></div>

        <a href="login.html" id="login-btn" class="text-blue-500">Login</a>
    </nav>
    </header>
    <div class="signup-container">
        <h2>Create an Account</h2>
        <form id="signup-form">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="input-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
            </div>

            <div class="input-group">
                <button type="submit" id="signup-btn">Sign Up</button>
            </div>

            <p class="login-redirect">Already have an account? <a href="Login.html">Login here</a></p>
        </form>
    </div>

    <script src="js/signup.js"></script>
</body>
</html>
